<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Login - Jhonder Capital</title>

    <link rel="stylesheet" href="../css/login.css">

</head>

<body>

    <div class="login-box">

        <h1>Jhonder Capital S.A.C.</h1>

        <p>Iniciar sesión</p>

        <input
            type="email"
            id="correo"
            placeholder="Correo"
        >

        <input
            type="password"
            id="password"
            placeholder="Contraseña"
        >

        <button onclick="iniciarSesion()">

            Entrar

        </button>

    </div>

    <script src="../js/login.js"></script>

</body>

</html>
