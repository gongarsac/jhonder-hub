<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Configuración - Jhonder Capital</title>

    <link rel="stylesheet" href="../css/dashboard.css">

</head>

<body>


<div class="main"></div>

    <div class="hero">

    <h1>⚙️ Configuración</h1>

    <p>
        Administra la información del sistema.
    </p>

    <div class="estado-sistema">

        <p>🟢 Sistema activo</p>

        <p id="fechaRespaldo">
            Último respaldo: --
        </p>

    </div>

</div>

    <div class="card">

        <h2>Empresa</h2>

       <label>Nombre de la empresa</label>

<input
    type="text"
    id="empresa"
    placeholder="Jhonder Capital S.A.C."
>

<label>Moneda</label>   

<select id="moneda">

    <option value="S/">Soles (S/)</option>

    <option value="$">Dólares ($)</option>

</select>

<label>Capital inicial</label>

<input
    type="number"
    id="capitalInicial"
    placeholder="10000"
>

        <br><br>

        <button onclick="guardarConfiguracion()">

            Guardar configuración

        </button>
        <br><br>

<button onclick="cerrarSesion()">

    🚪 Cerrar sesión

</button>

    </div>

    <br>


<div class="card">

    <h2>Respaldo de datos</h2>

    <p>
        Exporta o importa todas las operaciones.
    </p>

    <br>

    <button onclick="exportarDatos()">
        📥 Exportar respaldo
    </button>

    <br><br>

    <button onclick="generarReporteDiario()">
        📊 Generar reporte diario
    </button>

    <br><br>

    <input
        type="file"
        id="archivoBackup"
    >

    <br><br>

    <button onclick="importarDatos()">
        📤 Importar respaldo
    </button>

</div>

<br>

<div class="card zona-peligro">

    <h2>⚠️ Zona peligrosa</h2>

    <p>
        Esta acción eliminará todas las compras, ventas e historial.
    </p>

    <br>

    <button
        onclick="reiniciarSistema()"
        class="btn-eliminar"
    >

        🗑️ Reiniciar sistema

    </button>

</div>

</div>

<script src="../js/config.js"></script>

</body>

</html>
