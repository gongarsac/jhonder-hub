<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jhonder Capital S.A.C.</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="contenedor-login">

        <div class="panel-izquierdo">

            <div class="contenido-izquierdo">

                <h1>Jhonder Capital</h1>

                <p>
                    Trading • Inversiones • Activos digitales
                </p>

            </div>

        </div>

        <div class="panel-derecho">

            <div class="login">

                <h2>Bienvenido</h2>

                <p class="subtitulo">

                    Inicia sesión para acceder
                    a la plataforma.

                </p>

                <div class="campo">

                    <input
                        type="email"
                        id="correo"
                        placeholder="Correo electrónico"
                    >

                </div>

                <div class="campo">

                    <input
                        type="password"
                        id="password"
                        placeholder="Contraseña"
                    >

                </div>

                <button onclick="login()">

                    Ingresar
                    <p class="version">
    Sistema interno v1.0
</p>



                </button>

            </div>

        </div>

    </div>

    <script src="js/app.js"></script>
<footer class="footer">

    <p>

        © 2026 Jhonder Capital S.A.C.

    </p>

    <span>

        Plataforma interna de gestión USDT

    </span>

</footer>
</body>

</html>
